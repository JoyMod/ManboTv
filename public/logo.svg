<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40">
  <!-- 背景 -->
  <rect width="120" height="40" rx="8" fill="#141414"/>
  
  <!-- 播放按钮融合 M 字母 -->
  <g transform="translate(8, 8)">
    <!-- M 的左半部分 -->
    <path
      d="M4 20 L10 4 L16 20"
      stroke="#E50914"
      stroke-width="4"
      fill="none"
      stroke-linecap="round"
      stroke-linejoin="round"
    />
    <!-- 播放三角形 -->
    <polygon
      points="14,8 22,14 14,20"
      fill="#E50914"
    />
  </g>
  
  <!-- 文字部分 -->
  <text
    x="38"
    y="26"
    font-size="16"
    fill="white"
    font-weight="800"
    font-family="system-ui, -apple-system, sans-serif"
    letter-spacing="0.5"
  >
    曼波TV
  </text>
  
  <!-- 下划线装饰 -->
  <rect
    x="38"
    y="30"
    width="60"
    height="3"
    rx="1.5"
    fill="#E50914"
  />
</svg>
